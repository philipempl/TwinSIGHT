version: '3'
services:

#---------------------------------------- Zookeeper ----------------------------------------------------

  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    expose:
      - "2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - information_domain

#---------------------------------------- MQTT Broker  --------------------------------------------------

  emqx:
    image: emqx/emqx:4.2.7
    hostname: emqx
    container_name: emqx
    restart: always
    ports:
      - "1883:1883"
      - "8883:8883"
      - "18083:18083"
    networks:
      - information_domain

#---------------------------------------- Ditto (Digital Twin) -------------------------------------------

  mongodb:
    image: docker.io/mongo:4.2
    hostname: mongodb
    networks:
      default:
        aliases:
          - mongodb
    command: mongod --storageEngine wiredTiger --noscripting
    user: mongodb
    ports:
      - 27017:27017
    environment:
       TZ: Europe/Berlin

  ditto-policies:
    image: docker.io/eclipse/ditto-policies:${DITTO_VERSION:-latest}
    hostname: ditto-policies
    mem_limit: 512m
    networks:
      default:
        aliases:
          - ditto-cluster
    environment:
      - TZ=Europe/Berlin
      - INSTANCE_INDEX=1
      - BIND_HOSTNAME=0.0.0.0
      - OPENJ9_JAVA_OPTIONS=-XX:+ExitOnOutOfMemoryError -Xtune:virtualized -Xss512k -XX:MaxRAMPercentage=80 -Dakka.coordinated-shutdown.exit-jvm=on -Dakka.cluster.shutdown-after-unsuccessful-join-seed-nodes=120s
      - MONGO_DB_HOSTNAME=mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # - DITTO_LOGGING_FILE_APPENDER=true
    # Set additional configuration options here
    # -Dditto.ditto-policies...
    command: java -jar starter.jar
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto

  ditto-things:
    image: docker.io/eclipse/ditto-things:${DITTO_VERSION:-latest}
    mem_limit: 512m
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - ditto-policies
    environment:
      - TZ=Europe/Berlin
      - INSTANCE_INDEX=1
      - BIND_HOSTNAME=0.0.0.0
      - OPENJ9_JAVA_OPTIONS=-XX:+ExitOnOutOfMemoryError -Xtune:virtualized -Xss512k -XX:MaxRAMPercentage=80 -Dakka.coordinated-shutdown.exit-jvm=on -Dakka.cluster.shutdown-after-unsuccessful-join-seed-nodes=120s
      - MONGO_DB_HOSTNAME=mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # - DITTO_LOGGING_FILE_APPENDER=true
    # Set additional configuration options here
    # -Dditto.things...
    command: java -jar starter.jar
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto

  ditto-things-search:
    image: docker.io/eclipse/ditto-things-search:${DITTO_VERSION:-latest}
    hostname: ditto-things-search
    mem_limit: 512m
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - ditto-policies
    environment:
      - TZ=Europe/Berlin
      - INSTANCE_INDEX=1
      - BIND_HOSTNAME=0.0.0.0
      - OPENJ9_JAVA_OPTIONS=-XX:+ExitOnOutOfMemoryError -Xtune:virtualized -Xss512k -XX:MaxRAMPercentage=80 -Dakka.coordinated-shutdown.exit-jvm=on -Dakka.cluster.shutdown-after-unsuccessful-join-seed-nodes=120s
      - MONGO_DB_HOSTNAME=mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # - DITTO_LOGGING_FILE_APPENDER=true
    # Set additional configuration options here
    # -Dditto.things-search...
    command: java -jar starter.jar
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto

  ditto-concierge:
    image: docker.io/eclipse/ditto-concierge:${DITTO_VERSION:-latest}
    hostname: ditto-concierge
    mem_limit: 512m
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - ditto-policies
    environment:
      - TZ=Europe/Berlin
      - INSTANCE_INDEX=1
      - BIND_HOSTNAME=0.0.0.0
      - OPENJ9_JAVA_OPTIONS=-XX:+ExitOnOutOfMemoryError -Xtune:virtualized -Xss512k -XX:MaxRAMPercentage=80 -Dakka.coordinated-shutdown.exit-jvm=on -Dakka.cluster.shutdown-after-unsuccessful-join-seed-nodes=120s
      - MONGO_DB_HOSTNAME=mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # - DITTO_LOGGING_FILE_APPENDER=true
    # Set additional configuration options here
    # -Dditto.concierge...
    command: java -jar starter.jar
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto

  ditto-connectivity:
    image: docker.io/eclipse/ditto-connectivity:${DITTO_VERSION:-latest}
    hostname: ditto-connectivity
    mem_limit: 768m
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - ditto-policies
      - ditto-concierge
    environment:
      - TZ=Europe/Berlin
      - INSTANCE_INDEX=1
      - BIND_HOSTNAME=0.0.0.0
      - OPENJ9_JAVA_OPTIONS=-XX:+ExitOnOutOfMemoryError -Xtune:virtualized -Xss512k -XX:MaxRAMPercentage=80 -Dakka.coordinated-shutdown.exit-jvm=on -Dakka.cluster.shutdown-after-unsuccessful-join-seed-nodes=120s
      - MONGO_DB_HOSTNAME=mongodb
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # - DITTO_LOGGING_FILE_APPENDER=true
    # Set additional configuration options here
    # -Dditto.connectivity...
    command: java -jar starter.jar
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    #volumes:
    #  - ditto_log_files:/var/log/ditto

  ditto-gateway:
    image: docker.io/eclipse/ditto-gateway:${DITTO_VERSION:-latest}
    hostname: ditto-gateway
    mem_limit: 512m
    networks:
      default:
        aliases:
          - ditto-cluster
    depends_on:
      - ditto-policies
      - ditto-concierge
    ports:
      - "8081:8080"
    environment:
      - TZ=Europe/Berlin
      - INSTANCE_INDEX=1
      - BIND_HOSTNAME=0.0.0.0
      - ENABLE_PRE_AUTHENTICATION=true
      - OPENJ9_JAVA_OPTIONS=-XX:+ExitOnOutOfMemoryError -Xtune:virtualized -Xss512k -XX:MaxRAMPercentage=80 -Dakka.coordinated-shutdown.exit-jvm=on -Dakka.cluster.shutdown-after-unsuccessful-join-seed-nodes=120s
      # in order to write logs into a file you can enable this by setting the following env variable
      # the log file(s) can be found in /var/log/ditto directory on the host machine
      # - DITTO_LOGGING_FILE_APPENDER=true
      # You may use the environment for setting the devops password
      #- DEVOPS_PASSWORD=foobar
    # Set additional configuration options here
    # -Dditto.gateway...
    # Setting the devops password via java VM environment
    command: java -Dditto.gateway.authentication.devops.password=foobar -jar starter.jar
    # only needed if DITTO_LOGGING_FILE_APPENDER is set
    # volumes:
    #  - ditto_log_files:/var/log/ditto

  ditto-swagger-ui:
    image: docker.io/swaggerapi/swagger-ui:v3.38.0
    hostname: ditto-swagger-ui
    volumes:
       - ./volumes/ditto/swagger/openapi:/usr/share/nginx/html/openapi:ro
       - ./volumes/ditto/swagger/images:/usr/share/nginx/html/images:ro
       - ../volumes/ditto/swagger/swagger3-index.html:/usr/share/nginx/html/index.html:ro
    command: nginx -g 'daemon off;'

  ditto-nginx:
    image: docker.io/nginx:1.20-alpine
    hostname: ditto-nginx
    volumes:
       - ./volumes/ditto/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
       - ./volumes/ditto/nginx/nginx.htpasswd:/etc/nginx/nginx.htpasswd:ro
       - ./volumes/ditto/nginx/nginx-cors.conf:/etc/nginx/nginx-cors.conf:ro
       - ./volumes/ditto/nginx/index.html:/etc/nginx/html/index.html:ro
       - ./volumes/ditto/swagger/images:/etc/nginx/html/images:ro
    ports:
      - "${DITTO_EXTERNAL_PORT:-8080}:80"
    depends_on:
      - ditto-gateway
      - ditto-swagger-ui

#---------------------------------------- Kafka -----------------------------------------------------

  kafka1:
    image: wurstmeister/kafka
    command: [start-kafka.sh]
    restart: always
    hostname: kafka1
    container_name: kafka1
    expose:
      - "9091"
    environment:
      KAFKA_CREATE_TOPICS: "LENZDRGB610:1:1" # topic:partition:replicas
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://kafka1:19091,OUTSIDE://localhost:9091
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka1:19091,OUTSIDE://localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_BROKER_ID: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - information_domain
    volumes:
      - ./volumes/kafka1/data:/var/lib/kafka/data
    depends_on:
      - "zookeeper"
    links:
      - "zookeeper"

  kafka2:
    image: wurstmeister/kafka
    command: [start-kafka.sh]
    restart: always
    hostname: kafka2
    container_name: kafka2
    expose:
      - "9092"
    environment:
      KAFKA_CREATE_TOPICS: "LENZDRGB610:1:1" # topic:partition:replicas
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://kafka2:19092,OUTSIDE://localhost:9092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka2:19092,OUTSIDE://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_BROKER_ID: 2
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - information_domain
    volumes:
      - ./volumes/kafka2/data:/var/lib/kafka/data
    depends_on:
      - "zookeeper"
    links:
      - "zookeeper"

  kafka3:
    image: wurstmeister/kafka
    command: [start-kafka.sh]
    restart: always
    hostname: kafka3
    container_name: kafka3
    expose:
      - "9093"
    environment:
      KAFKA_CREATE_TOPICS: "LENZDRGB610:1:1" # topic:partition:replicas
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_LISTENERS: INSIDE://kafka3:19093,OUTSIDE://localhost:9093
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka3:19093,OUTSIDE://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_BROKER_ID: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - information_domain
    volumes:
      - ./volumes/kafka3/data:/var/lib/kafka/data
    depends_on:
      - "zookeeper"
    links:
      - "zookeeper"

  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "9000:8080"
    restart: always
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:19091
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - information_domain
    depends_on:
      - kafka1
      - kafka2
      - kafka3

#---------------------------------------- ELK Stack ----------------------------------------------------

  elasticsearch:
    hostname: elasticsearch
    container_name: elasticsearch
    build:
      context: volumes/elasticsearch/
    volumes:
      - type: bind
        source: ./volumes/elasticsearch/config/elasticsearch.yml
        target: /usr/share/elasticsearch/config/elasticsearch.yml
        read_only: true
      - type: volume
        source: elasticsearch
        target: /usr/share/elasticsearch/data
    expose:
      - "9200"
      - "9300"
    environment:
      ES_JAVA_OPTS: "-Xmx512m -Xms512m"
      ELASTIC_USERNAME: elastic
      ELASTIC_PASSWORD: changeme
      # Use single node discovery in order to disable production mode and avoid bootstrap checks.
      # see: https://www.elastic.co/guide/en/elasticsearch/reference/current/bootstrap-checks.html
      discovery.type: single-node
    networks:
      - information_domain

  logstash:
    hostname: logstash
    container_name: logstash
    build:
      context: volumes/logstash/
    volumes:
      - type: bind
        source: ./volumes/logstash/config/logstash.yml
        target: /usr/share/logstash/config/logstash.yml
        read_only: true
      - type: bind
        source: ./volumes/logstash/pipeline
        target: /usr/share/logstash/pipeline
        read_only: true
    expose:
      - "5044"
      - "5000/tcp"
      - "5000/udp"
      - "9600"
    environment:
      LS_JAVA_OPTS: "-Xmx512m -Xms512m"
    networks:
      - information_domain
    depends_on:
      - elasticsearch
      - kafka1
      - kafka2
      - kafka3

  kibana:
    hostname: kibana
    container_name: kibana
    build:
      context: volumes/kibana/
    volumes:
      - type: bind
        source: ./volumes/kibana/config/kibana.yml
        target: /usr/share/kibana/config/kibana.yml
        read_only: true
      - type: bind
        source: ./volumes/kibana/config/wazuh.yml
        target: /usr/share/kibana/data/wazuh/config/wazuh.yml
    ports:
      - "5601:5601"
    networks:
      - business_domain
      - information_domain
    depends_on:
      - elasticsearch
      - wazuh

#---------------------------------------- Wazuh ---------------------------------------------------------------

  wazuh:
    image: wazuh/wazuh-odfe:4.1.1
    hostname: wazuh
    container_name: wazuh
    restart: always
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      ELASTIC_USERNAME: elastic
      ELASTIC_PASSWORD: changeme
      FILEBEAT_SSL_VERIFICATION_MODE: none
      API_USERNAME: "adlheid"                               # Wazuh API username
      API_PASSWORD: "IacXSo?aDiQcixj9"
    volumes:
      - ossec_api_configuration:/var/ossec/api/configuration
      - ossec_etc:/var/ossec/etc
      - ossec_logs:/var/ossec/logs
      - ossec_queue:/var/ossec/queue
      - ossec_var_multigroups:/var/ossec/var/multigroups
      - ossec_integrations:/var/ossec/integrations
      - ossec_active_response:/var/ossec/active-response/bin
      - ossec_agentless:/var/ossec/agentless
      - ossec_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
    depends_on:
      - elasticsearch
    networks:
      - information_domain
#---------------------------------------- Volumes and Networks ------------------------------------------------

volumes:
  elasticsearch:
  ossec_api_configuration:
  ossec_etc:
  ossec_logs:
  ossec_queue:
  ossec_var_multigroups:
  ossec_integrations:
  ossec_active_response:
  ossec_agentless:
  ossec_wodles:
  filebeat_etc:
  filebeat_var:
  ditto_log_files:
    driver: local
    driver_opts:
      type: none
      device: /var/log/ditto
      o: bind,uid=1000,gid=1000
networks:
  information_domain:
    driver: bridge
  business_domain:
    driver: bridge
